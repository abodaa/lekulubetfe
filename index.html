<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/lb.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mark Bingo</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // Debug Telegram Web App loading
    window.addEventListener('load', function () {
      console.log('Page loaded, checking Telegram Web App...');
      console.log('window.Telegram:', !!window.Telegram);
      console.log('window.Telegram.WebApp:', !!window.Telegram?.WebApp);
      console.log('initData:', window.Telegram?.WebApp?.initData);
      console.log('initDataUnsafe:', window.Telegram?.WebApp?.initDataUnsafe);

      // Initialize Telegram WebApp if available
      if (window.Telegram?.WebApp) {
        try {
          window.Telegram.WebApp.ready();
          window.Telegram.WebApp.expand();
          console.log('✅ Telegram WebApp initialized and expanded');
          
          // Log detailed initData info
          const initData = window.Telegram.WebApp.initData;
          const initDataUnsafe = window.Telegram.WebApp.initDataUnsafe;
          
          console.log('📊 Telegram WebApp Details:', {
            initData: initData ? `Present (${initData.length} chars)` : 'Missing',
            initDataUnsafe: initDataUnsafe ? 'Present' : 'Missing',
            user: initDataUnsafe?.user ? 'Present' : 'Missing',
            platform: window.Telegram.WebApp.platform,
            version: window.Telegram.WebApp.version,
            isExpanded: window.Telegram.WebApp.isExpanded
          });
          
          // If we have initData, log it for debugging
          if (initData) {
            console.log('🔍 Raw initData:', initData);
            try {
              const params = new URLSearchParams(initData);
              console.log('📋 Parsed initData params:', Object.fromEntries(params));
            } catch (e) {
              console.warn('Failed to parse initData:', e);
            }
          }
        } catch (error) {
          console.error('❌ Failed to initialize Telegram WebApp:', error);
        }
      } else {
        console.warn('⚠️ Telegram WebApp not available');
      }
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
